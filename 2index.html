<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestFinder | Secure Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --dark: #1e293b; --light: #f8fafc; --accent: #f43f5e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f1f5f9; color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; }

        header { background: var(--dark); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        main { flex: 1; padding: 2rem; max-width: 1000px; margin: 0 auto; width: 100%; }
        
        .page { display: none; }
        .page.active { display: block; }
        
        .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
        
        input { padding: 0.8rem; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; margin-bottom: 1rem; }
        .btn { padding: 0.8rem 1.5rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; width: 100%; }
        .btn-primary { background: var(--primary); color: white; }
        
        #nav-links { display: none; }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-house-chimney"></i> NestFinder</h1>
        <div id="nav-links">
            <button onclick="showPage('user')" class="btn" style="width: auto; background: none; color: white;">Browse</button>
            <button onclick="showPage('seller')" class="btn" style="width: auto; background: none; color: white;">Manage</button>
            <button onclick="logout()" class="btn" style="width: auto; background: #f43f5e; color: white;">Logout</button>
        </div>
    </header>

    <main id="app">
        <section id="page-login" class="page active">
            <div class="card" style="max-width: 400px; margin: auto;">
                <h2>Login</h2>
                <p>Select role to access:</p><br>
                <button class="btn btn-primary" onclick="login('user')">Login as User</button><br><br>
                <button class="btn btn-primary" onclick="login('seller')">Login as Seller</button>
            </div>
        </section>

        <section id="page-user" class="page">
            <input type="text" id="search" placeholder="Search by city..." onkeyup="render()">
            <div id="user-grid" class="grid"></div>
        </section>

        <section id="page-seller" class="page">
            <div class="card">
                <h3>Add New Property</h3>
                <input type="text" id="inTitle" placeholder="Title">
                <input type="text" id="inAddress" placeholder="Address">
                <input type="number" id="inPrice" placeholder="Monthly Price">
                <button class="btn btn-primary" onclick="addProperty()">Add Property</button>
            </div>
            <div id="seller-grid" class="grid"></div>
        </section>
    </main>

    <script>
        let state = { userRole: null, properties: [
            { id: 1, title: "Studio", address: "New York", price: 1200 },
            { id: 2, title: "Loft", address: "Chicago", price: 2500 }
        ]};

        function login(role) {
            state.userRole = role;
            document.getElementById('nav-links').style.display = 'block';
            showPage(role);
        }

        function logout() {
            state.userRole = null;
            document.getElementById('nav-links').style.display = 'none';
            showPage('login');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            render();
        }

        function render() {
            const term = document.getElementById('search')?.value.toLowerCase() || '';
            const filtered = state.properties.filter(p => p.address.toLowerCase().includes(term));
            
            document.getElementById('user-grid').innerHTML = filtered.map(p => `
                <div class="card"><h3>${p.title}</h3><p>${p.address}</p><p><strong>$${p.price}</strong></p></div>
            `).join('');

            document.getElementById('seller-grid').innerHTML = state.properties.map(p => `
                <div class="card"><h3>${p.title}</h3><p>${p.address}</p><button class="btn" style="background:#f43f5e; color:white; margin-top:10px" onclick="deleteProperty(${p.id})">Delete</button></div>
            `).join('');
        }

        function addProperty() {
            const p = { id: Date.now(), title: document.getElementById('inTitle').value, address: document.getElementById('inAddress').value, price: document.getElementById('inPrice').value };
            state.properties.push(p);
            render();
        }

        function deleteProperty(id) {
            state.properties = state.properties.filter(p => p.id !== id);
            render();
        }
    </script>
</body>
</html>
